<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>迷你占星課程・預約報名</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #f2b8c6;
    --blush: #fde8ef;
    --mauve: #d48fa8;
    --cream: #fdf6f0;
    --warm-white: #fff9f5;
    --text: #4a3040;
    --muted: #9b7080;
    --gold: #c9a97a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background elements */
  .bg-orbs {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
  }

  .orb-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #f9ccd8, #f2b8c6);
    top: -100px; right: -100px;
    animation: drift1 12s ease-in-out infinite;
  }

  .orb-2 {
    width: 350px; height: 350px;
    background: radial-gradient(circle, #fde8ef, #e8b4c8);
    bottom: 10%; left: -80px;
    animation: drift2 15s ease-in-out infinite;
  }

  .orb-3 {
    width: 200px; height: 200px;
    background: radial-gradient(circle, #c9a97a44, #d48fa822);
    top: 40%; right: 20%;
    animation: drift1 18s ease-in-out infinite reverse;
  }

  @keyframes drift1 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-30px, 30px); }
  }

  @keyframes drift2 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(20px, -20px); }
  }

  /* Stars */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    width: 3px; height: 3px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0;
    animation: twinkle var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.5); }
  }

  /* Layout */
  .page {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* Header */
  .moon-symbol {
    text-align: center;
    font-size: 2.5rem;
    margin-bottom: 12px;
    animation: glow 3s ease-in-out infinite;
    filter: drop-shadow(0 0 12px var(--rose));
  }

  @keyframes glow {
    0%, 100% { filter: drop-shadow(0 0 8px var(--rose)); }
    50% { filter: drop-shadow(0 0 20px var(--mauve)); }
  }

  .eyebrow {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeUp 0.8s 0.2s forwards;
  }

  h1 {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    font-weight: 300;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeUp 0.8s 0.4s forwards;
  }

  h1 em {
    font-style: italic;
    color: var(--mauve);
  }

  .subtitle {
    text-align: center;
    font-size: 1rem;
    color: var(--muted);
    line-height: 1.9;
    margin-bottom: 50px;
    font-weight: 300;
    opacity: 0;
    animation: fadeUp 0.8s 0.6s forwards;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.8s 0.7s forwards;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--rose), transparent);
  }

  .divider-icon {
    color: var(--gold);
    font-size: 1rem;
  }

  /* Topics grid */
  .topics-label {
    text-align: center;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.8s 0.8s forwards;
  }

  .topics-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 50px;
    opacity: 0;
    animation: fadeUp 0.8s 0.9s forwards;
  }

  .topic-pill {
    background: linear-gradient(135deg, var(--warm-white), var(--blush));
    border: 1px solid var(--rose);
    border-radius: 40px;
    padding: 10px 14px;
    text-align: center;
    font-size: 0.82rem;
    color: var(--text);
    transition: all 0.3s;
    cursor: default;
  }

  .topic-pill:hover {
    background: linear-gradient(135deg, var(--blush), #f9ccd8);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(242, 184, 198, 0.4);
  }

  /* Form card */
  .form-card {
    background: linear-gradient(145deg, rgba(255,249,245,0.95), rgba(253,232,239,0.8));
    border: 1px solid rgba(242, 184, 198, 0.5);
    border-radius: 24px;
    padding: 44px 40px;
    backdrop-filter: blur(10px);
    box-shadow:
      0 4px 40px rgba(212, 143, 168, 0.12),
      inset 0 1px 0 rgba(255,255,255,0.8);
    opacity: 0;
    animation: fadeUp 0.8s 1s forwards;
  }

  .form-title {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 300;
    color: var(--text);
    margin-bottom: 6px;
  }

  .form-desc {
    text-align: center;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input, select {
    width: 100%;
    padding: 14px 18px;
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(212, 143, 168, 0.35);
    border-radius: 12px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.95rem;
    color: var(--text);
    transition: all 0.3s;
    outline: none;
    appearance: none;
  }

  input::placeholder { color: #c4a8b0; }

  input:focus, select:focus {
    border-color: var(--mauve);
    background: rgba(255,255,255,0.9);
    box-shadow: 0 0 0 3px rgba(212, 143, 168, 0.15);
  }

  .select-wrapper {
    position: relative;
  }

  .select-wrapper::after {
    content: '⌄';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-55%);
    color: var(--muted);
    pointer-events: none;
    font-size: 1.1rem;
  }

  /* Topics checkboxes */
  .topics-check {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(212, 143, 168, 0.25);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s;
    font-size: 0.88rem;
    color: var(--text);
  }

  .check-item:hover {
    background: rgba(253, 232, 239, 0.8);
    border-color: var(--rose);
  }

  .check-item input[type="checkbox"] {
    width: 16px; height: 16px;
    padding: 0;
    accent-color: var(--mauve);
    cursor: pointer;
    flex-shrink: 0;
    border-radius: 4px;
  }

  /* Submit button */
  .btn {
    width: 100%;
    padding: 16px;
    margin-top: 28px;
    background: linear-gradient(135deg, var(--rose), var(--mauve));
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.35s;
    box-shadow: 0 6px 24px rgba(212, 143, 168, 0.4);
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(212, 143, 168, 0.5);
  }

  .btn:hover::before { opacity: 1; }
  .btn:active { transform: translateY(0); }

  /* Privacy note */
  .privacy {
    text-align: center;
    font-size: 0.75rem;
    color: #c4a8b0;
    margin-top: 16px;
    line-height: 1.6;
  }

  /* Success state */
  .success-msg {
    display: none;
    text-align: center;
    padding: 20px;
  }

  .success-msg.show { display: block; }

  .success-icon {
    font-size: 3rem;
    margin-bottom: 12px;
    animation: pop 0.5s ease;
  }

  @keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .success-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    color: var(--mauve);
    margin-bottom: 8px;
  }

  .success-sub {
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.7;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 60px;
    font-size: 0.75rem;
    color: #c4a8b0;
    letter-spacing: 0.1em;
    opacity: 0;
    animation: fadeUp 0.8s 1.2s forwards;
  }

  .footer span { color: var(--rose); }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .form-card { padding: 32px 22px; }
    .topics-grid { grid-template-columns: repeat(2, 1fr); }
    .topics-check { grid-template-columns: 1fr; }
    h1 { font-size: 2.2rem; }
  }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="stars" id="stars"></div>

<div class="page">

  <div class="moon-symbol">🌙</div>

  <p class="eyebrow">Mini Astrology Course</p>

  <h1>用占星，讀懂<br><em>你自己的故事</em></h1>

  <p class="subtitle">
    不需要任何基礎<br>
    從星盤出發，溫柔地認識自己
  </p>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-icon">✦</div>
    <div class="divider-line"></div>
  </div>

  <p class="topics-label">課程涵蓋主題</p>

  <div class="topics-grid">
    <div class="topic-pill">☀️ 太陽星座</div>
    <div class="topic-pill">🌙 月亮星座</div>
    <div class="topic-pill">⬆️ 上升星座</div>
    <div class="topic-pill">♀ 金星與愛</div>
    <div class="topic-pill">🪐 土星課題</div>
    <div class="topic-pill">✨ 星盤解讀</div>
  </div>

  <div class="form-card">
    <div id="formContent">
      <h2 class="form-title">預約・搶先知道開課消息</h2>
      <p class="form-desc">留下你的資訊，開課第一時間通知你 🌸</p>

      <form id="signupForm" onsubmit="handleSubmit(event)">

        <div class="form-group">
          <label>你的名字</label>
          <input type="text" name="name" placeholder="如何稱呼你？" required>
        </div>

        <div class="form-group">
          <label>Email 信箱</label>
          <input type="email" name="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
          <label>你的星座</label>
          <div class="select-wrapper">
            <select name="zodiac">
              <option value="" disabled selected>選擇你的太陽星座</option>
              <option>♈ 牡羊座</option>
              <option>♉ 金牛座</option>
              <option>♊ 雙子座</option>
              <option>♋ 巨蟹座</option>
              <option>♌ 獅子座</option>
              <option>♍ 處女座</option>
              <option>♎ 天秤座</option>
              <option>♏ 天蠍座</option>
              <option>♐ 射手座</option>
              <option>♑ 摩羯座</option>
              <option>♒ 水瓶座</option>
              <option>♓ 雙魚座</option>
              <option>🤷 還不確定</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>你最想學的主題（可複選）</label>
          <div class="topics-check">
            <label class="check-item">
              <input type="checkbox" name="topics" value="認識自己的星盤">
              認識自己的星盤
            </label>
            <label class="check-item">
              <input type="checkbox" name="topics" value="感情與關係">
              感情與關係
            </label>
            <label class="check-item">
              <input type="checkbox" name="topics" value="事業與天賦">
              事業與天賦
            </label>
            <label class="check-item">
              <input type="checkbox" name="topics" value="月相與日常">
              月相與日常
            </label>
            <label class="check-item">
              <input type="checkbox" name="topics" value="行運與流年">
              行運與流年
            </label>
            <label class="check-item">
              <input type="checkbox" name="topics" value="療癒與自我成長">
              療癒與自我成長
            </label>
          </div>
        </div>

        <button type="submit" class="btn">✨ 我想第一個知道開課消息</button>

        <p class="privacy">🔒 你的資料只用於通知課程相關消息，不會分享給第三方</p>
      </form>
    </div>

    <div class="success-msg" id="successMsg">
      <div class="success-icon">🌸</div>
      <h3 class="success-title">已收到你的報名！</h3>
      <p class="success-sub">
        謝謝你 ✨<br>
        開課消息會第一時間寄到你的信箱<br>
        期待和你一起走進星空的世界 🌙
      </p>
    </div>
  </div>

  <p class="footer">
    made with <span>♥</span> & starlight
  </p>

</div>

<script>
  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.cssText = `
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      --dur: ${2 + Math.random() * 4}s;
      --delay: ${Math.random() * 5}s;
      width: ${Math.random() > 0.7 ? 4 : 2}px;
      height: ${Math.random() > 0.7 ? 4 : 2}px;
    `;
    starsEl.appendChild(star);
  }

  // Form submit
  async function handleSubmit(e) {
    e.preventDefault();
    const form = e.target;
    const btn = form.querySelector('.btn');

    btn.textContent = '傳送中...';
    btn.disabled = true;

    const data = new FormData(form);

    try {
      const res = await fetch('https://formspree.io/f/maqpywjw', {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });

      if (res.ok) {
        document.getElementById('formContent').style.display = 'none';
        document.getElementById('successMsg').classList.add('show');
      } else {
        btn.textContent = '發送失敗，請再試一次';
        btn.disabled = false;
      }
    } catch (err) {
      btn.textContent = '網路錯誤，請再試一次';
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
